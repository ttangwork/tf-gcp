name: Terraform GCP

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy?'
        required: true
        default: network
        type: choice
        options:
        - network
        - gke
        - gce
      destroy:
        description: 'Destroy?'
        required: true
        default: false
        type: boolean

env:
  TF_VERSION: 1.8.0
  WORKING_DIR: "terraform/${{ github.event.inputs.component }}"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: production
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.event.inputs.destroy == 'false'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: GCP Auth
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format Check
      run: terraform fmt -check -recursive

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -var-file=../tfvars/prod.tfvars -out=tfplan

    - name: Upload Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: ${{ env.WORKING_DIR }}/tfplan
        retention-days: 5

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    needs: terraform-plan
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.event.inputs.destroy == 'false'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: GCP Auth
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      run: terraform init

    - name: Download Plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan
        path: ${{ env.WORKING_DIR }}

    - name: Terraform Apply
      run: terraform apply tfplan

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: production
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.event.inputs.destroy == 'true'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: GCP Auth
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan Destroy
      run: terraform plan -var-file=../tfvars/prod.tfvars -destroy -out=tfplan-destroy

    - name: Upload Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: ${{ env.WORKING_DIR }}/tfplan
        retention-days: 5

    - name: Terraform Destroy
      run: terraform apply tfplan-destroy
