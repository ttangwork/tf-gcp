{{- if eq .Values.ingressMode "gateway" }}
{{- range $name, $team := .Values.teams }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}-http-route
  namespace: {{ $name }}
spec:
  parentRefs:
  - name: ext-gateway
    namespace: platform
    sectionName: http-8080
  hostnames:
  - {{ $name }}.{{ $.Values.domain }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /
    backendRefs:
    - name: nginx
      port: 8080
      weight: 100
{{- end }}
{{- end }}
