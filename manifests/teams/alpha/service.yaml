# Service for nginx deployment
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: alpha
  labels:
    app: nginx
    service: nginx
spec:
  ports:
  - port: 8080
    targetPort: 80
    name: http
  selector:
    app: nginx
---

# Service account for nginx deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx
  namespace: alpha
  labels:
    account: nginx
---

# Deployment for nginx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: alpha
  labels:
    app: nginx
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
      version: v1
  template:
    metadata:
      labels:
        app: nginx
        version: v1
    spec:
      serviceAccountName: nginx
      containers:
      - name: nginx
        image: docker.io/nginx:alpine
        imagePullPolicy: IfNotPresent
        env:
          - name: ENVIRONMENT
            valueFrom:
              configMapKeyRef:
                name: alpha-config
                key: environment
          - name: TEAM
            valueFrom:
              configMapKeyRef:
                name: alpha-config
                key: team
          - name: API_KEY
            valueFrom:
              secretKeyRef:
                name: alpha-secret
                key: api-key
        volumeMounts:
          - name: config
            mountPath: "/config"
            readOnly: true
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 256Mi
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: config
        configMap:
          name: alpha-config
          items:
          - key: config.yaml
            path: config.yaml
---
